<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>word counter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <h1>word counter</h1>
  <p class="sub">paste some text, get the numbers</p>

  <textarea id="text" placeholder="paste or type here..."></textarea>

  <div class="stats">
    <div class="stat"><span class="lbl">words</span><span class="val" id="words">0</span></div>
    <div class="stat"><span class="lbl">characters</span><span class="val" id="chars">0</span></div>
    <div class="stat"><span class="lbl">characters (no spaces)</span><span class="val" id="charsNoSpace">0</span></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
